<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Index Librorum Prohibitorum</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>📚 INDEX LIBRORUM PROHIBITORIUM</h1>
    <h2>LIFT THE VEIL, BEAR THE COST</h2>
    <p>A collection of forbidden books around the world.</p>
  </header>

  <!-- Search & Filter Controls -->
  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search by title or author..." />
    <select id="languageFilter">
      <option value="all">All Languages</option>
      <!-- populated dynamically by script.js -->
    </select>
    <select id="categoryFilter">
      <option value="all">All Categories</option>
      <option value="Technology">Technology</option>
      <option value="Science">Science</option>
      <option value="Literature">Literature</option>
      <option value="History">History</option>
      <option value="Arts">Arts</option>
      <option value="Philosophy">Philosophy</option>
    </select>
    <select id="sortOrder">
      <option value="id">Original Order</option>
      <option value="title">Sort by Title</option>
      <option value="title">Sort by Title</option>
      <option value="year">Sort by Year</option>
      <option value="author">Sort by Author</option>
    </select>
  </div>

  <!-- Results Count -->
  <div class="results-info">
    <span id="resultsCount">Loading...</span>
  </div>

  <!-- Book Grid -->
  <div class="library-grid" id="libraryGrid">
    <!-- Cards injected by JavaScript -->
  </div>

  <footer>
    <p>© 2026 Index Librorum Prohibitorum · Built with Github Pages</p>
    <a href="https://www.facebook.com/HeinrichFaustScientiaQuaesitor" target="_blank" class="fb-link" aria-label="Contact me on Facebook">
      <svg class="fb-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M22 12c0-5.522-4.477-10-10-10S2 6.478 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987H7.898V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/>
      </svg>
    </a>
  </footer>

  <script src="script.js"></script>
</body>
</html>
